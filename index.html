<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situational Leadership Scenario Cards – ACME Laboratories Ltd.</title>
<style>
  :root {
    --navy: #1e3a5f;
    --navy-dark: #152d4a;
    --navy-mid: #244872;
    --white: #ffffff;
    --off-white: #f7f8fa;
    --card-w: 85.6mm;
    --card-h: 54mm;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #d0d5de;
    font-family: 'Montserrat', sans-serif;
    padding: 24px;
  }

  h1.page-title {
    font-weight: 800;
    color: var(--navy);
    font-size: 20px;
    text-align: center;
    margin-bottom: 4px;
  }
  p.subtitle {
    text-align: center;
    color: #5a6a82;
    font-size: 11px;
    margin-bottom: 20px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .tabs { display: flex; justify-content: center; margin-bottom: 28px; }
  .tab-btn {
    padding: 10px 30px;
    border: 2px solid var(--navy);
    background: transparent;
    color: var(--navy);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:first-child { border-radius: 4px 0 0 4px; border-right: none; }
  .tab-btn:last-child  { border-radius: 0 4px 4px 0; }
  .tab-btn.active { background: var(--navy); color: #fff; }

  .view { display: none; }
  .view.active { display: block; }

  .grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    justify-content: center;
    max-width: 1300px;
    margin: 0 auto;
  }

  .card {
    width: var(--card-w);
    height: var(--card-h);
    border-radius: 5mm;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2), 0 3px 8px rgba(0,0,0,0.1);
  }

  .card-front {
    background: var(--off-white);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8mm;
  }

  .front-border {
    position: absolute;
    inset: 4mm;
    border: 1.5px solid var(--navy);
    border-radius: 2.5mm;
  }

  .front-word {
    font-weight: 900;
    font-size: 18px;
    color: var(--navy);
    text-transform: uppercase;
    z-index: 3;
  }

  .card-back {
    background: var(--navy);
    color: white;
    display: flex;
    flex-direction: column;
    padding: 6mm;
    justify-content: center;
    align-items: center;
  }

  .back-content {
    font-size: 11px;
    line-height: 1.4;
    text-align: center;
    font-weight: 500;
  }

  .back-footer {
    margin-top: 4mm;
    font-size: 8px;
    text-transform: uppercase;
    opacity: 0.7;
    letter-spacing: 1px;
  }

  @media print {
    body { background: white; padding: 0; }
    .tabs, .page-title, .subtitle { display: none !important; }
    #view-print { display: block !important; }
    .print-page { page-break-after: always; display: flex; flex-wrap: wrap; gap: 5mm; padding: 10mm; }
    .card { box-shadow: none; border: 0.1pt solid #ddd; }
  }
</style>
</head>
<body>

<h1 class="page-title">Situational Leadership Training</h1>
<p class="subtitle">Scenario Cards - ACME Laboratories Ltd.</p>

<div class="tabs">
  <button class="tab-btn active" onclick="showView('front')">▶ Front Side</button>
  <button class="tab-btn" onclick="showView('back')">◀ Back Side</button>
</div>

<div class="view active" id="view-front">
  <div class="grid" id="front-grid"></div>
</div>

<div class="view" id="view-back">
  <div class="grid" id="back-grid"></div>
</div>

<script>
const scenarios = [
  { id: 1, title: "The Hesitant Newbie", desc: "Hasan - Joined last month, hesitates during calls, and asks you before every small decision." },
  { id: 2, title: "The Growth Seeker", desc: "Sultana - Top performer for 6 years, wants to lead a pilot launch. Rarely needs check-ins." },
  { id: 3, title: "The Selective Seller", desc: "Zahid - 3 years in, exceeds sales for his favorite brand but avoids the rest. Challenges new directives." },
  { id: 4, title: "The Untapped Leader", desc: "Nasir - Highly skilled and consistent, wants more strategic responsibilities to stay motivated." },
  { id: 5, title: "The Fresh Start", desc: "Arif - 2 weeks in the role, is eager but forgets the brand's positioning. Needs you to plan his day and demonstrate calls." },
  { id: 6, title: "The Confidence Dip", desc: "Mitu - 10 months in, avoids tough doctors after repeated rejection. Knows products, but energy is low." },
  { id: 7, title: "The Early Drop", desc: "Farzana - 8 months in, started strong, but sales have slipped. Claims 'market is down' and avoids high-value accounts." },
  { id: 8, title: "The Reluctant Fighter", desc: "Sharmin - Knows products well but avoids competitive prescribers, focusing only on easy calls." }
];

function createFront(s) {
  return `
    <div class="card card-front">
      <div class="front-border"></div>
      <div class="front-word">Scenario ${s.id}<br><span style="font-size:14px">${s.title}</span></div>
    </div>`;
}

function createBack(s) {
  return `
    <div class="card card-back">
      <div class="back-content">${s.desc}</div>
      <div class="back-footer">ACME Laboratories Ltd.</div>
    </div>`;
}

const fGrid = document.getElementById('front-grid');
const bGrid = document.getElementById('back-grid');

scenarios.forEach(s => {
  fGrid.innerHTML += createFront(s);
  bGrid.innerHTML += createBack(s);
});

function showView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
